appId: app.rendesk.desktop
productName: Rendesk
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - package.json
asar: true
asarUnpack:
  - "node_modules/@anthropic-ai/claude-agent-sdk/**/*"
npmRebuild: false
electronVersion: 38.1.0
artifactName: Rendesk-${version}-${os}-${arch}.${ext}
mac:
  category: public.app-category.developer-tools
  darkModeSupport: true
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
dmg:
  title: Rendesk
  background: build/dmg-background.png
  icon: build/icon.icns
  iconSize: 124
  writeUpdateInfo: false
  window:
    width: 680
    height: 440
  contents:
    - x: 188
      y: 224
      type: file
    - x: 492
      y: 224
      type: link
      path: /Applications
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
extraMetadata:
  main: dist/electron/main.js
